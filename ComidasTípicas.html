    <h1 style="font-family: Arial;">Comidas</h1>
    <p>A culinária em Mykonos destaca frutos do mar frescos, azeite de oliva, queijos locais e influências mediterrâneas. Pratos imperdíveis incluem gyros (carne no pão pita), moussaka (torta de berinjela e carne), polvo grelhado, salada grega (horiatiki), spanakopita (torta de espinafre) e baklava.</p>


  <div style="text-align: center;">
  <img src="foodm.jfif">
  </div>

  <p> Pita Gyros: Carne assada no espeto (frango ou porco) servida no pão pita com tzatziki, tomate, cebola e batatas fritas. </p>
  <p> Frutos do Mar e Peixes: Polvo grelhado, lula e peixes frescos, frequentemente secados ao sol e preparados na brasa. </p>
  <p> Moussaka: Tradicional lasanha grega feita com camadas de berinjela, batata, carne moída e molho bechamel. </p>

  <div style="text-align: center;">
  <img src="foodm1.jfif">
  </div>

  <p> Queijos Locais: Queijo Feta, Kopanisti (queijo picante fermentado típico) e Saganaki (queijo frito). </p>
  <p> Meze: Seleção de pequenas porções para compartilhar, como Dolmadakia (folhas de uva recheadas), Tzatziki (iogurte com pepino e alho) e Spanakopita (torta de espinafre). </p>
  <p> Doces e Sobremesas: Baklava (massa filo, mel e nozes) e Loukoumades (bolinhos fritos com calda de mel e canela). </p>

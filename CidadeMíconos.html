    <h1 style="font-family: Arial;">Cidade</h1>
    <p>Míconos é uma famosa ilha grega do arquipélago das Cíclades, conhecida por suas casas brancas, mar transparente, vida noturna agitada e moinhos de vento icônicos. Destino sofisticado no Mar Egeu, atrai turistas com beach clubs, praias de areia dourada e a charmosa capital, Chora, repleta de ruelas estreitas. </p>


  <div style="text-align: center;">
  <img src="mykonos.jfif">
  </div>

  <p> Míconos, parte das Cíclades na Grécia, tem raízes neolíticas (7.000 a.C.), ganhando destaque na mitologia como palco da batalha entre Zeus e os Gigantes. Habitada por Carians, Fenícios e Jônios, foi um centro comercial estratégico próximo a Delos. Após domínios romano, veneziano e otomano, destacou-se na Guerra de Independência Grega e hoje é um destino turístico cosmopolita. </p>
